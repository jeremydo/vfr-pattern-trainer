<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFR Pattern Trainer</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <!-- Menu screens — content injected by ui.js -->
    <div id="screen-main"     class="screen active"></div>
    <div id="screen-setup"    class="screen"></div>
    <div id="screen-briefing" class="screen"></div>
    <div id="screen-debrief"  class="screen"></div>

    <!-- Flight screen -->
    <div id="screen-flight" class="screen">
      <canvas id="game-canvas"></canvas>
      <canvas id="pfd-canvas"></canvas>

      <!-- Stall flash -->
      <div id="stall-flash">STALL</div>

      <!-- Pause -->
      <div id="pause-overlay">
        <div class="pause-box">PAUSED<br><small>P or Esc to resume</small></div>
      </div>
    </div>

  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
